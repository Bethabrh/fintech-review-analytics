name: FinTech Review Analytics CI
- name: Validate scripts run without crash (smoke test)
  run: |
    python -c "import src.preprocess_reviews"
on:
  push:
    branches:
      - main
      - task-1

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify project structure
        run: |
          test -f src/scrape_reviews.py
          test -f src/preprocess_reviews.py
          test -f src/sentiment_analysis.py
          test -f src/theme_extraction.py

      - name: Check Python syntax
        run: |
          python -m py_compile src/scrape_reviews.py
          python -m py_compile src/preprocess_reviews.py
          python -m py_compile src/sentiment_analysis.py
          python -m py_compile src/theme_extraction.py

      - name: CI completed successfully
        run: echo "Pipeline passed successfully!"